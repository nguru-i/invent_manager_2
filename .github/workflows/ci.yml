name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: 'True'
        run: pytest
